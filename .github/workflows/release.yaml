---
    name: "release"
    
    on:
      push:
        tags:
          - "*"
      workflow_dispatch:
        inputs:
          logLevel:
            description: 'Log level'     
            required: true
            default: 'warning'
    
    jobs:
      flutter-test:
        runs-on: "ubuntu-latest"
        permissions:
          contents: read
        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - name: Get Flutter dependencies
            run: flutter pub get
            shell: bash
          - name: Run Flutter tests
            run: flutter test
            shell: bash

      flutter-analyze:
        runs-on: "ubuntu-latest"
        permissions:
          contents: read
        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - name: Get Flutter dependencies
            run: flutter pub get
            shell: bash
          - name: Analyze Flutter project
            run: flutter analyze --no-fatal-infos --fatal-warnings
            shell: bash

      flutter-build-android:
        name: "Release for android"
        needs: [flutter-test, flutter-analyze]
        runs-on: "ubuntu-latest" 
        permissions: write-all
        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Extract tag name
            run: echo "tag=${{ github.ref_name }}" >> $GITHUB_ENV
            shell: bash
          - name: Echo build progress
            run: echo "Nizumi_android_${{ env.tag }}.apk build progress"
            shell: bash
          - name: Install dependencies
            run: |
              sudo apt-get update
              sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev libasound2-dev
            shell: bash
          - name: Set up JDK 17
            uses: actions/setup-java@v4
            with:
              java-version: '17'
              distribution: 'temurin'          
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            id: flutter-action
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - name: Get Flutter dependencies
            run: flutter pub get
            shell: bash
          - name: Remove build id
            run: sed -i -e 's/-Wl,/-Wl,--build-id=none,/' ${{ steps.flutter-action.outputs.PUB-CACHE-PATH }}/hosted/pub.dev/jni-*/src/CMakeLists.txt
          - name: Inject DanDan API Credentials
            run: |
              sed -i "s/kvpx7qkqjh/${{ secrets.DANDANAPI_APPID }}/g" lib/utils/mortis.dart
              sed -i "s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/${{ secrets.DANDANAPI_KEY }}/g" lib/utils/mortis.dart
          - name: Inject version from tag
            run: |
              sed -i "s/static const String version = '.*';/static const String version = '${{ github.ref_name }}';/" lib/request/config/api_endpoints.dart
              sed -i "s/^version: .*/version: ${{ github.ref_name }}+1/" pubspec.yaml
            shell: bash
          - name: Build Flutter for Android
            run: flutter build apk --split-per-abi
            shell: bash
          - name: Package android build output
            run: cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Nizumi_android_${env:tag}.apk
            shell: bash

          - name: Upload android outputs
            uses: actions/upload-artifact@v4
            with:
              name: android_outputs
              path: Nizumi_android_*.apk

      flutter-build-windows:
        name: "Release for windows"
        runs-on: "windows-latest"
        needs: [flutter-build-android, flutter-build-ios, flutter-build-linux, flutter-build-macos] 
        outputs:
          signing_enabled: ${{ steps.check_signpath.outputs.enabled }}
        permissions: write-all
    
        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - run: |
                  echo "tag=${{ github.ref_name }}" >> $env:GITHUB_ENV
          - run: echo "Nizumi_windows_${env:tag}.zip build progress"
          - run: choco install yq
          - name: Enable Git longpaths
            run: git config --system core.longpaths true
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - name: Set up Java
            uses: actions/setup-java@v4
            with:
              distribution: 'temurin'
              java-version: '18'
          - run: flutter pub get
          - name: Inject DanDan API Credentials
            env:
              DANDANAPI_APPID: ${{ secrets.DANDANAPI_APPID }}
              DANDANAPI_KEY: ${{ secrets.DANDANAPI_KEY }}
            run: |
              (Get-Content -Path 'lib/utils/mortis.dart') -replace "kvpx7qkqjh", "$env:DANDANAPI_APPID" | Set-Content -Path 'lib/utils/mortis.dart'
              (Get-Content -Path 'lib/utils/mortis.dart') -replace "rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax", "$env:DANDANAPI_KEY" | Set-Content -Path 'lib/utils/mortis.dart'
          - name: Inject version from tag
            run: |
              (Get-Content -Path 'lib/request/config/api_endpoints.dart') -replace "static const String version = '.*';", "static const String version = '${{ github.ref_name }}';" | Set-Content -Path 'lib/request/config/api_endpoints.dart'
              (Get-Content -Path 'pubspec.yaml') -replace "^version: .*", "version: ${{ github.ref_name }}+1" | Set-Content -Path 'pubspec.yaml'
          - run: flutter build windows
          - run: Compress-Archive build/windows/x64/runner/Release/* Nizumi_windows_${env:tag}.zip
          - name: Upload windows unsigned zip outputs
            uses: actions/upload-artifact@v4
            id: unsigned-windows-zip-artifacts
            with:
              name: windows_outputs
              path: |
                Nizumi_windows_*.zip

          # Sign Zip (requires SIGNPATH_API_TOKEN secret)
          - name: Check SignPath availability
            id: check_signpath
            shell: bash
            run: |
              if [ -n "$SIGNPATH_TOKEN" ]; then
                echo "enabled=true" >> $GITHUB_OUTPUT
              else
                echo "enabled=false" >> $GITHUB_OUTPUT
              fi
            env:
              SIGNPATH_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}

          - name: Prepare zip signing directory
            if: steps.check_signpath.outputs.enabled == 'true'
            run: New-Item -Path "build/windows/zip_signed_output" -ItemType Directory

          - name: sign windows zip
            if: steps.check_signpath.outputs.enabled == 'true'
            uses: signpath/github-action-submit-signing-request@v1.1
            with:
              api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
              organization-id: 'fa047255-4772-4be1-b14f-5cfa62635877'
              project-slug: 'Nizumi'
              signing-policy-slug: 'release-signing'
              artifact-configuration-slug: 'Packet'
              github-artifact-id: '${{ steps.unsigned-windows-zip-artifacts.outputs.artifact-id }}'
              wait-for-completion: true
              output-artifact-directory: 'build/windows/zip_signed_output'
           
          - name: Upload windows zip signed outputs
            if: steps.check_signpath.outputs.enabled == 'true'
            uses: actions/upload-artifact@v4
            id: signed-windows-zip-artifacts
            with:
              name: windows_zip_signed_outputs
              path: build/windows/zip_signed_output/*.zip
               
          # Replace Unpacked Artifact with Signed Artifact
          - name: Replace Unpacked Artifact with Signed Artifact
            if: steps.check_signpath.outputs.enabled == 'true'
            run: Expand-Archive -Path "build/windows/zip_signed_output/Nizumi_windows_${env:tag}.zip" -DestinationPath "build/windows/x64/runner/Release" -Force

          # Copy unsigned outputs as signed artifacts when signing is not available
          - name: Upload unsigned zip as signed artifact
            if: steps.check_signpath.outputs.enabled == 'false'
            uses: actions/upload-artifact@v4
            with:
              name: windows_zip_signed_outputs
              path: Nizumi_windows_*.zip
           
          # Build MSIX (unsigned)
          - name: Build unsigned msix
            if: steps.check_signpath.outputs.enabled == 'true'
            run: dart run msix:create
          - name: Upload windows msix unsigned outputs
            if: steps.check_signpath.outputs.enabled == 'true'
            uses: actions/upload-artifact@v4
            id: unsigned-windows-msix-artifacts
            with:
              name: windows_msix_outputs
              path: |
                build/windows/x64/runner/Release/nizumi.msix
           
          # Sign MSIX
          - name: Prepare msix signing directory
            if: steps.check_signpath.outputs.enabled == 'true'
            run: New-Item -Path "build/windows/msix_signed_output" -ItemType Directory
          - name: sign windows msix
            if: steps.check_signpath.outputs.enabled == 'true'
            uses: signpath/github-action-submit-signing-request@v1.1
            with:
              api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
              organization-id: 'fa047255-4772-4be1-b14f-5cfa62635877'
              project-slug: 'Nizumi'
              signing-policy-slug: 'release-signing'
              artifact-configuration-slug: 'MSIX'
              github-artifact-id: '${{ steps.unsigned-windows-msix-artifacts.outputs.artifact-id }}'
              wait-for-completion: true
              output-artifact-directory: 'build/windows/msix_signed_output'
           
          - name: Upload windows msix signed outputs
            if: steps.check_signpath.outputs.enabled == 'true'
            uses: actions/upload-artifact@v4
            id: signed-windows-msix-artifacts
            with:
              name: windows_msix_signed_outputs
              path: build/windows/msix_signed_output/*.msix

      flutter-build-linux:
        name: "Release for Linux"
        needs: [flutter-test, flutter-analyze]
        runs-on: "ubuntu-latest" 
        permissions: write-all
        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Extract tag name
            run: echo "tag=${{ github.ref_name }}" >> $GITHUB_ENV
            shell: bash
          - name: Echo build progress
            run: echo "Nizumi_linux_${{ env.tag }}.tar.gz build progress"
            shell: bash
          - name: Install dependencies
            run: |
              sudo apt-get update
              sudo apt-get install -y clang cmake libgtk-3-dev ninja-build libayatana-appindicator3-dev unzip webkit2gtk-4.1 libasound2-dev
              sudo apt-get install -y gcc g++ autoconf automake debhelper glslang-dev ladspa-sdk xutils-dev libasound2-dev \
                  libarchive-dev libbluray-dev libbs2b-dev libcaca-dev libcdio-paranoia-dev libdrm-dev \
                  libdav1d-dev libdvdnav-dev libegl1-mesa-dev libepoxy-dev libfontconfig-dev libfreetype6-dev \
                  libfribidi-dev libgl1-mesa-dev libgbm-dev libgme-dev libgsm1-dev libharfbuzz-dev libjpeg-dev \
                  libbrotli-dev liblcms2-dev libmodplug-dev libmp3lame-dev libopenal-dev \
                  libopus-dev libopencore-amrnb-dev libopencore-amrwb-dev libpulse-dev librtmp-dev \
                  libsdl2-dev libsixel-dev libssh-dev libsoxr-dev libspeex-dev libtool \
                  libv4l-dev libva-dev libvdpau-dev libvorbis-dev libvo-amrwbenc-dev \
                  libunwind-dev libvpx-dev libwayland-dev libx11-dev libxext-dev \
                  libxkbcommon-dev libxrandr-dev libxss-dev libxv-dev libxvidcore-dev \
                  linux-libc-dev nasm ninja-build pkg-config python3 python3-docutils wayland-protocols \
                  x11proto-core-dev zlib1g-dev libfdk-aac-dev libtheora-dev libwebp-dev \
                  unixodbc-dev libpq-dev libxxhash-dev libaom-dev              
            shell: bash
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - name: Get Flutter dependencies
            run: flutter pub get
            shell: bash
          - name: Inject DanDan API Credentials
            run: |
              sed -i "s/kvpx7qkqjh/${{ secrets.DANDANAPI_APPID }}/g" lib/utils/mortis.dart
              sed -i "s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/${{ secrets.DANDANAPI_KEY }}/g" lib/utils/mortis.dart
          - name: Inject version from tag
            run: |
              sed -i "s/static const String version = '.*';/static const String version = '${{ github.ref_name }}';/" lib/request/config/api_endpoints.dart
              sed -i "s/^version: .*/version: ${{ github.ref_name }}+1/" pubspec.yaml
            shell: bash
          - name: Build Flutter for Linux
            run: flutter build linux
            shell: bash
          # - name: Download FFmpeg Assets
          #   uses: dsaltares/fetch-gh-release-asset@master
          #   with:
          #     repo: 'Predidit/avbuild'
          #     version: 'tags/1.1.0'
          #     file: 'ffmpeg_linux_amd64.zip'
          #     token: ${{ secrets.GITHUB_TOKEN }}
          # - run: rm -f build/linux/x64/release/bundle/lib/libffmpeg.so.7
          # - run: unzip ffmpeg_linux_amd64.zip -d build/linux/x64/release/bundle/lib
          - name: Package linux build output
            run: |
              # Tarball package
              tar -zcvf Nizumi_linux_${{ env.tag }}_amd64.tar.gz -C build/linux/x64/release/bundle .

              # Extract version from pubspec.yaml for Debian control
              VERSION=$(grep '^version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)

              # Debian package
              mkdir Nizumi_linux_${{ env.tag }}_amd64
              cd Nizumi_linux_${{ env.tag }}_amd64
              mkdir -p opt/Nizumi
              mkdir -p usr/share/applications
              mkdir -p usr/share/icons/hicolor/512x512/apps
              cp -r ../build/linux/x64/release/bundle/* opt/Nizumi
              cp -r ../assets/linux/DEBIAN .
              chmod 0755 DEBIAN/postinst
              chmod 0755 DEBIAN/postrm

              cat>DEBIAN/control<<EOF
              Maintainer: madoka773 <valigarmanda55@gmail.com>
              Package: Nizumi
              Version: ${VERSION}
              Section: x11
              Priority: optional
              Architecture: amd64
              Essential: no
              Installed-Size: 34648
              Description: Watch Animes online with danmaku support.
              Homepage: https://github.com/shuaidaoya/Nizumi
              Depends: libayatana-appindicator3-1,
                       gir1.2-ayatanaappindicator3-0.1,
                       libwebkit2gtk-4.1-0
              EOF

              cp ../assets/linux/io.github.Predidit.Nizumi.desktop usr/share/applications
              cp ../assets/images/logo/logo_linux.png usr/share/icons/hicolor/512x512/apps/io.github.Predidit.Nizumi.png

              cd ..
              dpkg-deb --build --root-owner-group Nizumi_linux_${{ env.tag }}_amd64
            shell: bash

          - name: Upload linux outputs
            uses: actions/upload-artifact@v4
            with:
              name: linux_outputs
              path: |
                Nizumi_linux_*.tar.gz
                Nizumi_linux_*.deb

      flutter-build-ios:
        name: "Release for iOS"
        needs: [flutter-test, flutter-analyze]
        runs-on: "macos-latest"
        permissions: write-all

        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Extract tag name
            run: echo "tag=${{ github.ref_name }}" >> $GITHUB_ENV
          - name: Echo build progress
            run: echo "Nizumi_ios_${{ env.tag }}.ipa build progress"
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - run: flutter pub get
          - name: Inject DanDan API Credentials
            run: |
              sed -i '' "s/kvpx7qkqjh/${{ secrets.DANDANAPI_APPID }}/g" lib/utils/mortis.dart
              sed -i '' "s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/${{ secrets.DANDANAPI_KEY }}/g" lib/utils/mortis.dart
          - name: Inject version from tag
            run: |
              sed -i '' "s/static const String version = '.*';/static const String version = '${{ github.ref_name }}';/" lib/request/config/api_endpoints.dart
              sed -i '' "s/^version: .*/version: ${{ github.ref_name }}+1/" pubspec.yaml
          - name: Build IPA
            run: |
              flutter build ios --release --no-codesign
          - name: Create IPA
            run: |
              mkdir Payload
              cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
              find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
              zip -q -r Nizumi_ios_${{ env.tag }}_no_sign.ipa Payload
          - name: Upload iOS build
            uses: actions/upload-artifact@v4
            with:
              name: ios_outputs
              path: Nizumi_ios_*.ipa

      flutter-build-macos:
        name: "Release for Macos"
        needs: [flutter-test, flutter-analyze]
        runs-on: "macos-latest"
        permissions: write-all

        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Extract tag name
            run: echo "tag=${{ github.ref_name }}" >> $GITHUB_ENV
          - name: Echo build progress
            run: echo "Nizumi_macos_${{ env.tag }}.dmg build progress"
          - name: Set up Flutter
            uses: subosito/flutter-action@v2.16.0
            with:
              channel: stable
              flutter-version-file: pubspec.yaml
          - run: flutter pub get
          - name: Inject DanDan API Credentials
            run: |
              sed -i '' "s/kvpx7qkqjh/${{ secrets.DANDANAPI_APPID }}/g" lib/utils/mortis.dart
              sed -i '' "s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/${{ secrets.DANDANAPI_KEY }}/g" lib/utils/mortis.dart
          - name: Inject version from tag
            run: |
              sed -i '' "s/static const String version = '.*';/static const String version = '${{ github.ref_name }}';/" lib/request/config/api_endpoints.dart
              sed -i '' "s/^version: .*/version: ${{ github.ref_name }}+1/" pubspec.yaml
          - run: flutter build macos --release
          - name: Create DMG
            run: |
              npm install --global create-dmg
              create-dmg build/macos/Build/Products/Release/Nizumi.app
            continue-on-error: true
          - name: Rename DMG
            run: mv Nizumi*.dmg Nizumi_macos_${{ env.tag }}.dmg
          - name: Upload MacOS build
            uses: actions/upload-artifact@v4
            with:
              name: macos_outputs
              path: Nizumi_macos_*.dmg

      release:
        name: "Release"
        runs-on: "ubuntu-latest"
        needs: [flutter-build-windows] 
        permissions: write-all
        steps:
          - name: Clone repository
            uses: actions/checkout@v4
          - name: Extract tag name
            run: echo "tag=${{ github.ref_name }}" >> $GITHUB_ENV
            shell: bash
          - name: Set up JDK 17
            uses: actions/setup-java@v4
            with:
              java-version: '17'
              distribution: 'temurin'          
          - name: Setup Android SDK
            uses: android-actions/setup-android@v3
          - name: Setup Android build tools
            run: sdkmanager "build-tools;34.0.0"
  
          - name: Download windows zip build file
            uses: actions/download-artifact@v4
            with:
              name: windows_zip_signed_outputs
              path: windows_zip_signed_outputs 
          - name: List files in windows_outputs directory
            run: ls -l windows_zip_signed_outputs   
          - name: Copy windows build file to root
            run: cp windows_zip_signed_outputs/* Nizumi_windows_${{ env.tag }}.zip

          - name: Download windows msix build file
            if: ${{ needs.flutter-build-windows.outputs.signing_enabled == 'true' }}
            uses: actions/download-artifact@v4
            with:
              name: windows_msix_signed_outputs
              path: windows_msix_signed_outputs  
          - name: List files in windows_msix_signed_outputs directory
            if: ${{ needs.flutter-build-windows.outputs.signing_enabled == 'true' }}
            run: ls -l windows_msix_signed_outputs   
          - name: Copy windows build file to root
            if: ${{ needs.flutter-build-windows.outputs.signing_enabled == 'true' }}
            run: cp windows_msix_signed_outputs/* Nizumi_windows_${{ env.tag }}.msix

          - name: Download android build file
            uses: actions/download-artifact@v4
            with:
              name: android_outputs
              path: android_outputs 
          - name: List files in android_outputs directory
            run: ls -l android_outputs   
          - name: Copy android build file to unsigned floder
            run: | 
              mkdir build
              mkdir build/unsigned
              mkdir build/signed
              cp android_outputs/* build/unsigned/Nizumi_android_${{ env.tag }}.apk

          - name: Download iOS build file
            uses: actions/download-artifact@v4
            with:
              name: ios_outputs
              path: ios_outputs  
          - name: List files in ios_outputs directory
            run: ls -l ios_outputs   
          - name: Copy ios build file to root
            run: cp ios_outputs/* Nizumi_ios_${{ env.tag }}_no_sign.ipa

          - name: Download macos build file
            uses: actions/download-artifact@v4
            with:
              name: macos_outputs
              path: macos_outputs  
          - name: List files in macos_outputs directory
            run: ls -l macos_outputs   
          - name: Copy macos build file to root
            run: cp macos_outputs/* Nizumi_macos_${{ env.tag }}.dmg   
            
          - name: Download linux build file
            uses: actions/download-artifact@v4
            with:
              name: linux_outputs
              path: linux_outputs  
          - name: List files in linux_outputs directory
            run: ls -l linux_outputs   
          - name: Copy linux build file to root
            run: cp linux_outputs/* .

          - name: Check Android signing capability
            id: check_android_signing
            shell: bash
            run: |
              if [ -n "$SIGNING_KEY" ]; then
                echo "enabled=true" >> $GITHUB_OUTPUT
              else
                echo "enabled=false" >> $GITHUB_OUTPUT
              fi
            env:
              SIGNING_KEY: ${{ secrets.SIGNING_KEY_BASE64 }}

          - name: Sign APK
            if: steps.check_android_signing.outputs.enabled == 'true'
            id: sign_app
            uses: filippoLeporati93/android-release-signer@v1
            with:
              releaseDirectory: build/unsigned
              signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
              alias: ${{ secrets.KEY_ALIAS }}
              keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
            env:
              BUILD_TOOLS_VERSION: "34.0.0"

          - name: Copy Signed android build file
            if: steps.check_android_signing.outputs.enabled == 'true'
            run: cp ${{steps.sign_app.outputs.signedReleaseFile}} build/signed/Nizumi_android_${{ env.tag }}.apk

          - name: Copy unsigned android build file (no signing key)
            if: steps.check_android_signing.outputs.enabled == 'false'
            run: cp build/unsigned/Nizumi_android_${{ env.tag }}.apk build/signed/Nizumi_android_${{ env.tag }}.apk

          - name: Create release
            if: ${{ startsWith(github.ref, 'refs/tags/') }}
            uses: softprops/action-gh-release@v2
            with:
              files: |
                build/signed/*.apk
                Nizumi_windows_*.zip
                Nizumi_windows_*.msix
                Nizumi_macos_*.dmg
                Nizumi_ios_*.ipa
                Nizumi_linux_*.tar.gz
                Nizumi_linux_*.deb
