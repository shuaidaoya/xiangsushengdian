<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nizumi 规则制作工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font: 14px/1.5 system-ui, sans-serif; background: #f5f5f5; color: #333; }
  .layout { display: flex; height: 100vh; }
  .panel { padding: 16px; overflow-y: auto; }
  .left { width: 420px; min-width: 420px; background: #fff; border-right: 1px solid #e0e0e0; }
  .right { flex: 1; display: flex; flex-direction: column; }
  h2 { font-size: 16px; margin-bottom: 12px; color: #0070f3; border-bottom: 2px solid #0070f3; padding-bottom: 4px; }
  h3 { font-size: 13px; margin: 12px 0 6px; color: #555; }
  label { display: block; font-size: 12px; color: #666; margin-top: 8px; }
  input, textarea, select { width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; margin-top: 2px; font-family: 'Consolas', 'Courier New', monospace; }
  textarea { resize: vertical; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-primary { background: #0070f3; color: #fff; }
  .btn-primary:hover { background: #005bb5; }
  .btn-test { background: #e8f0fe; color: #0070f3; margin-left: 8px; font-size: 11px; padding: 4px 8px; }
  .btn-test:hover { background: #d0e0fc; }
  .btn-danger { background: #fdecea; color: #b71c1c; }
  .btn-danger:hover { background: #f5d0cf; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .xpath-row { display: flex; align-items: center; gap: 4px; }
  .xpath-row input { flex: 1; }
  .checkbox-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 13px; }
  .topbar { display: flex; gap: 8px; padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #e0e0e0; align-items: center; }
  .topbar input { flex: 1; font-size: 14px; }
  iframe { flex: 1; width: 100%; border: none; background: #fff; }
  .output { padding: 12px; background: #1e1e1e; color: #d4d4d4; border-top: 1px solid #333; max-height: 200px; overflow-y: auto; font-size: 12px; }
  .output pre { white-space: pre-wrap; word-break: break-all; }
  .badge { display: inline-block; padding: 2px 6px; background: #e8f0fe; color: #0070f3; border-radius: 3px; font-size: 11px; margin-top: 2px; }
  .error { color: #b71c1c; font-size: 11px; margin-top: 2px; }
  .success { color: #1b5e20; font-size: 11px; margin-top: 2px; }
  .hint { color: #999; font-size: 11px; }
</style>
</head>
<body>
<div class="layout">
  <div class="panel left">
    <h2>规则制作器</h2>

    <h3>基础信息</h3>
    <label>规则名称 <span class="hint">(英文，如 agedm)</span></label>
    <input id="name" placeholder="agedm" value="">
    <label>版本</label>
    <input id="version" value="1.0" style="width:100px">
    <label>站点首页</label>
    <input id="baseURL" placeholder="https://www.example.com/">

    <label>搜索地址 <span class="hint">(用 @keyword 代替关键词)</span></label>
    <input id="searchURL" placeholder="https://www.example.com/search?q=@keyword">

    <h3>XPath 选择器</h3>
    <div class="xpath-row">
      <label style="flex:1">searchList <span class="hint">(搜索结果容器)</span></label>
      <button class="btn-test btn-sm" onclick="testXPath('searchList')">测试</button>
    </div>
    <input id="searchList" placeholder="//div[@class='result-item']">
    <span id="count_searchList" class="badge" style="display:none"></span>

    <div class="xpath-row">
      <label style="flex:1">searchName <span class="hint">(剧名, 相对)</span></label>
      <button class="btn-test btn-sm" onclick="testXPath('searchName')">测试</button>
    </div>
    <input id="searchName" placeholder="//h3/a">
    <span id="count_searchName" class="badge" style="display:none"></span>

    <div class="xpath-row">
      <label style="flex:1">searchResult <span class="hint">(详情链接, 相对)</span></label>
      <button class="btn-test btn-sm" onclick="testXPath('searchResult')">测试</button>
    </div>
    <input id="searchResult" placeholder="//h3/a">
    <span id="count_searchResult" class="badge" style="display:none"></span>

    <div class="xpath-row">
      <label style="flex:1">chapterRoads <span class="hint">(剧集列表区域)</span></label>
      <button class="btn-test btn-sm" onclick="testXPath('chapterRoads')">测试</button>
    </div>
    <input id="chapterRoads" placeholder="//div[@class='playlist']">
    <span id="count_chapterRoads" class="badge" style="display:none"></span>

    <div class="xpath-row">
      <label style="flex:1">chapterResult <span class="hint">(每集链接, 相对)</span></label>
      <button class="btn-test btn-sm" onclick="testXPath('chapterResult')">测试</button>
    </div>
    <input id="chapterResult" placeholder="//li/a">
    <span id="count_chapterResult" class="badge" style="display:none"></span>

    <h3>高级选项</h3>
    <div class="checkbox-row">
      <input type="checkbox" id="useWebview" checked> <label>使用 WebView (需要JS渲染)</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="usePost"> <label>搜索使用 POST 请求</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="useLegacyParser"> <label>传统解析器 (iframe 模式)</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="adBlocker"> <label>HLS 广告过滤</label>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="muliSources" checked> <label>多播放源</label>
    </div>
    <label>自定义 UserAgent <span class="hint">(留空=随机)</span></label>
    <input id="userAgent" placeholder="">
    <label>自定义 Referer <span class="hint">(留空=自动)</span></label>
    <input id="referer" placeholder="">

    <div style="margin-top:16px; display:flex; gap:8px">
      <button class="btn-primary" onclick="buildRule()">生成规则 JSON</button>
      <button class="btn-danger btn-sm" onclick="copyKazumi()" id="btnCopy" style="display:none">复制 kazumi://</button>
    </div>
  </div>

  <div class="right">
    <div class="topbar">
      <span style="white-space:nowrap;font-size:13px">测试页面</span>
      <input id="testUrl" placeholder="在此粘贴目标页面 URL 并回车加载到右侧 iframe">
      <button class="btn-primary btn-sm" onclick="navigate()">加载</button>
      <button class="btn-test btn-sm" onclick="useSearchURL()">用搜索地址测试</button>
    </div>
    <div class="topbar" style="background:#fff; border-bottom:1px solid #e0e0e0">
      <input id="xpathQuick" placeholder="快速 XPath 测试: //div[@class='xxx']" style="font-size:14px" onkeydown="if(event.key==='Enter')quickTest()">
      <button class="btn-test" onclick="quickTest()" style="font-size:12px;padding:6px 12px">测试</button>
      <span id="quickResult" class="badge" style="display:none"></span>
    </div>
    <iframe id="frame" sandbox="allow-scripts allow-same-origin"></iframe>
    <div class="output">
      <pre id="output">点击 "生成规则 JSON" 查看结果...
提示: 右侧 iframe 因跨域限制无法直接操作，请在目标网站按 F12 打开 DevTools Console，粘贴以下代码来测试 XPath:</pre>
    </div>
  </div>
</div>

<script>
// ============================================================================
// XPath test helper (for use in browser console on the target site)
// Copy this to the target site's Console to test XPath expressions
// ============================================================================
window.XPATH_HELPER = `
/* === Nizumi XPath 测试代码 - 在目标网站 Console 中粘贴执行 === */
function testXPath(xpath, relativeRoot) {
  try {
    var result = document.evaluate(
      xpath,
      relativeRoot || document,
      null,
      XPathResult.ORDERED_NODE_SNAPSHOT_TYPE,
      null
    );
    var count = result.snapshotLength;
    var items = [];
    for (var i = 0; i < Math.min(count, 5); i++) {
      var node = result.snapshotItem(i);
      items.push(node.textContent.trim().substring(0, 80) + ' | href=' + (node.href || node.querySelector('a')?.href || ''));
    }
    console.log('匹配 ' + count + ' 个节点:');
    console.table(items);
    return count;
  } catch(e) {
    console.error('XPath 错误:', e.message);
    return 0;
  }
}
// 用法:
// testXPath('//div[@class="result-item"]')           -- searchList
// searchList返回的每个节点作为root, 测试相对XPath:
// testXPath('.//h3/a', searchListNode)                -- searchName (相对)
// testXPath('.//a', searchListNode)                   -- searchResult (相对)
console.log('✅ Nizumi XPath 测试工具已就绪。用法: testXPath("//div")');
`;

// Input dispatch helper for React/Vue sites
window.INPUT_DISPATCH = `
function fillInput(xpath, value) {
  var el = document.evaluate(xpath, document, null, XPathResult.FIRST_ORDERED_NODE_TYPE, null).singleNodeValue;
  if (!el) { console.log('未找到元素'); return; }
  var nativeSetter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
  nativeSetter.call(el, value);
  el.dispatchEvent(new Event('input', { bubbles: true }));
  el.dispatchEvent(new Event('change', { bubbles: true }));
  el.focus(); el.blur();
  console.log('已填入:', value);
}
`;

// Show helper code in output
document.getElementById('output').innerHTML = 
  '<pre>## 在目标网站 Console 中粘贴以下代码来测试 XPath:\n</pre>' +
  '<pre>' + escapeHtml(XPATH_HELPER) + '</pre>';

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ============================================================================
// Quick test from embedded console
// ============================================================================
function quickTest() {
  var xpath = document.getElementById('xpathQuick').value;
  if (!xpath) { alert('请输入 XPath'); return; }
  try {
    // Test in the iframe's document
    var frameDoc = document.getElementById('frame').contentDocument || document.getElementById('frame').contentWindow?.document;
    if (!frameDoc) {
      alert('无法访问 iframe 内容（跨域限制）。请在目标网站 Console 中测试。');
      return;
    }
    var result = frameDoc.evaluate(xpath, frameDoc, null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
    var count = result.snapshotLength;
    var items = [];
    for (var i = 0; i < Math.min(count, 5); i++) {
      var node = result.snapshotItem(i);
      items.push(node.textContent.trim().substring(0, 60));
    }
    document.getElementById('quickResult').style.display = 'inline-block';
    document.getElementById('quickResult').textContent = '匹配 ' + count + ' 个';
    document.getElementById('output').innerHTML = '<pre>' + '匹配 ' + count + ' 个节点:\n' + items.map(function(s,i){ return '['+i+'] '+s; }).join('\n') + '</pre>';
  } catch(e) {
    document.getElementById('output').innerHTML = '<pre style="color:#f44336">错误: ' + e.message + '</pre>';
  }
}

// ============================================================================
// Test individual XPath fields against the iframe
// ============================================================================
function testXPath(fieldName) {
  var xpath = document.getElementById(fieldName).value;
  if (!xpath) { alert('请先填写 ' + fieldName + ' 的 XPath'); return; }
  var frameDoc = document.getElementById('frame').contentDocument || document.getElementById('frame').contentWindow?.document;
  if (!frameDoc) {
    alert('无法访问 iframe 内容（跨域限制）。\n\n请在目标网站 Console 中使用以下代码测试:\n\ntestXPath("' + xpath.replace(/"/g, '\\"') + '")');
    return;
  }
  try {
    var result = frameDoc.evaluate(xpath, frameDoc, null, XPathResult.ORDERED_NODE_SNAPSHOT_TYPE, null);
    var count = result.snapshotLength;
    document.getElementById('count_' + fieldName).style.display = 'inline-block';
    document.getElementById('count_' + fieldName).textContent = '匹配 ' + count + ' 个';
    if (count > 0) {
      document.getElementById('count_' + fieldName).style.background = '#e8f5e9';
      document.getElementById('count_' + fieldName).style.color = '#2e7d32';
    } else {
      document.getElementById('count_' + fieldName).style.background = '#fdecea';
      document.getElementById('count_' + fieldName).style.color = '#b71c1c';
    }
  } catch(e) {
    document.getElementById('count_' + fieldName).style.display = 'inline-block';
    document.getElementById('count_' + fieldName).textContent = '语法错误';
    document.getElementById('count_' + fieldName).style.background = '#fdecea';
    document.getElementById('count_' + fieldName).style.color = '#b71c1c';
  }
}

// ============================================================================
// Navigate iframe
// ============================================================================
function navigate() {
  var url = document.getElementById('testUrl').value.trim();
  if (!url) { url = document.getElementById('baseURL').value.trim(); }
  if (!url) { alert('请输入 URL'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  document.getElementById('frame').src = url;
}

function useSearchURL() {
  var url = document.getElementById('searchURL').value.trim();
  if (!url) { alert('请先填写搜索地址'); return; }
  url = url.replace('@keyword', encodeURIComponent(prompt('搜索关键词:', '测试')));
  if (!url) return;
  document.getElementById('testUrl').value = url;
  document.getElementById('frame').src = url;
}

// ============================================================================
// Build rule JSON
// ============================================================================
function buildRule() {
  var name = document.getElementById('name').value.trim();
  if (!name) { alert('请填写规则名称'); return; }
  if (!document.getElementById('baseURL').value.trim()) { alert('请填写站点首页'); return; }
  if (!document.getElementById('searchURL').value.trim()) { alert('请填写搜索地址'); return; }

  var rule = {
    api: '7',
    type: 'anime',
    name: name,
    version: document.getElementById('version').value || '1.0',
    muliSources: document.getElementById('muliSources').checked,
    useWebview: document.getElementById('useWebview').checked,
    useNativePlayer: true,
    usePost: document.getElementById('usePost').checked,
    useLegacyParser: document.getElementById('useLegacyParser').checked,
    adBlocker: document.getElementById('adBlocker').checked,
    userAgent: document.getElementById('userAgent').value.trim(),
    baseURL: document.getElementById('baseURL').value.trim(),
    searchURL: document.getElementById('searchURL').value.trim(),
    searchList: document.getElementById('searchList').value.trim(),
    searchName: document.getElementById('searchName').value.trim(),
    searchResult: document.getElementById('searchResult').value.trim(),
    chapterRoads: document.getElementById('chapterRoads').value.trim(),
    chapterResult: document.getElementById('chapterResult').value.trim(),
    referer: document.getElementById('referer').value.trim()
  };

  var json = JSON.stringify(rule, null, 2);
  var base64 = btoa(unescape(encodeURIComponent(json)));
  var kazumi = 'kazumi://' + base64;

  document.getElementById('output').innerHTML =
    '<pre style="color:#4caf50">## 规则 JSON:\n</pre>' +
    '<pre>' + escapeHtml(json) + '</pre>\n' +
    '<pre style="color:#4caf50;margin-top:12px">## kazumi:// 导入链接:\n</pre>' +
    '<pre style="color:#ffab40">' + kazumi + '</pre>';

  window._kazumi = kazumi;
  document.getElementById('btnCopy').style.display = 'inline-block';
}

function copyKazumi() {
  if (!window._kazumi) return;
  navigator.clipboard.writeText(window._kazumi).then(function() {
    var btn = document.getElementById('btnCopy');
    btn.textContent = '已复制!';
    setTimeout(function() { btn.textContent = '复制 kazumi://'; }, 1500);
  });
}
</script>
</body>
</html>
